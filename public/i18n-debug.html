<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>I18N Debug</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .debug-info { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 5px; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
    </style>
</head>
<body>
    <h1>I18N System Debug</h1>
    
    <div class="debug-info">
        <h3>System Status</h3>
        <div id="system-status">Checking...</div>
    </div>
    
    <div class="debug-info">
        <h3>Translation Test</h3>
        <div data-i18n="navigation.transfer">Transfer</div>
        <div data-i18n="transfer.no_peers_message">No peers message</div>
        <div data-i18n="transfer.you_are_known_as">You are known as</div>
    </div>
    
    <div class="debug-info">
        <h3>Language Selector</h3>
        <div data-i18n-selector></div>
    </div>

    <!-- I18N Scripts -->
    <script src="scripts/i18n/core/i18n-core.js"></script>
    <script src="scripts/i18n/components/language-selector.js"></script>
    <script src="scripts/i18n/init.js"></script>
    
    <script>
        // 调试脚本
        function checkI18NStatus() {
            const statusDiv = document.getElementById('system-status');
            let status = '';
            
            // 检查核心对象
            if (window.DropshareI18N) {
                status += '<div class="success">✅ DropshareI18N found</div>';
                
                // 检查初始化状态
                if (window.DropshareI18N.isInitialized) {
                    status += '<div class="success">✅ I18N system initialized</div>';
                    status += `<div>Current language: ${window.DropshareI18N.getCurrentLanguage()}</div>`;
                    
                    // 测试翻译
                    const testKey = 'navigation.transfer';
                    const translation = window.DropshareI18N.t(testKey);
                    if (translation && translation !== testKey) {
                        status += `<div class="success">✅ Translation working: "${testKey}" → "${translation}"</div>`;
                    } else {
                        status += `<div class="error">❌ Translation failed: "${testKey}" → "${translation}"</div>`;
                    }
                } else {
                    status += '<div class="error">❌ I18N system not initialized</div>';
                }
            } else {
                status += '<div class="error">❌ DropshareI18N not found</div>';
            }
            
            // 检查语言选择器
            if (window.LanguageSelector) {
                status += '<div class="success">✅ LanguageSelector found</div>';
            } else {
                status += '<div class="error">❌ LanguageSelector not found</div>';
            }
            
            statusDiv.innerHTML = status;
        }
        
        // 等待页面加载完成后检查状态
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(checkI18NStatus, 1000);
        });
        
        // 监听i18n初始化事件
        document.addEventListener('i18n:initialized', () => {
            console.log('I18N initialized event received');
            setTimeout(checkI18NStatus, 500);
        });
    </script>
</body>
</html>
