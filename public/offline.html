<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - DropShare</title>
    <meta name="description" content="DropShare is currently offline. Please check your internet connection.">
    <link rel="icon" sizes="96x96" href="images/favicon-96x96.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .offline-container {
            max-width: 500px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            font-weight: 700;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            opacity: 0.9;
            line-height: 1.6;
        }

        .retry-button {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .retry-button:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .features {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }

        .feature {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        .feature-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .feature-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .feature-desc {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .features {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="logo">📡</div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. DropShare needs an internet connection to work properly.</p>
        
        <button class="retry-button" onclick="window.location.reload()">Try Again</button>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🖼️</div>
                <div class="feature-title">Image Tools</div>
                <div class="feature-desc">Convert and edit images</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🎵</div>
                <div class="feature-title">Audio Tools</div>
                <div class="feature-desc">Process audio files</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🎥</div>
                <div class="feature-title">Video Tools</div>
                <div class="feature-desc">Convert video formats</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📄</div>
                <div class="feature-title">Document Tools</div>
                <div class="feature-desc">Process documents</div>
            </div>
        </div>
    </div>

    <script>
        // 检查网络状态
        window.addEventListener('online', () => {
            window.location.reload();
        });

        // 定期检查连接
        setInterval(() => {
            if (navigator.onLine) {
                window.location.reload();
            }
        }, 5000);
    </script>
</body>
</html>
